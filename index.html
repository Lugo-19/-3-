<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#07050f">
<title>Para ti 💛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #fbeef3;
    --ink-soft: #efd9e4;
    --accent: #ff9ec7;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    min-height:100dvh;
    overflow:hidden;
    background: linear-gradient(160deg, #07050f, #120a22, #1c0f33, #0a0716);
    background-size: 220% 220%;
    animation: bgShift 30s ease-in-out infinite;
    color: var(--ink);
    font-family:'Poppins', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select:none; -webkit-user-select:none;
    overscroll-behavior:none;
  }
  body.calm{
    background: linear-gradient(160deg, #0c0820, #241141, #3a1a5c, #160c2e);
    background-size: 220% 220%;
    animation: bgShift 38s ease-in-out infinite;
  }
  @keyframes bgShift{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
  }

  /* ---------- Capas ---------- */
  .layer{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
    padding: max(4vh, env(safe-area-inset-top)) 6vw max(5vh, env(safe-area-inset-bottom));
  }
  #nebula{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  #stars{ position:fixed; inset:0; z-index:1; overflow:hidden; pointer-events:none; }
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(125% 85% at 50% 30%, transparent 36%, rgba(2,1,8,.62) 100%);
  }
  #messageLayer{ z-index:3; }
  #mediaLayer{ z-index:3; }
  #recetaLayer{ z-index:3; }
  #finalLayer{ z-index:4; }

  /* ---------- Galaxia: nebulosa + estrellas ---------- */
  #nebula{
    background:
      radial-gradient(38% 30% at 24% 28%, rgba(150,72,222,.30), transparent 72%),
      radial-gradient(42% 32% at 80% 22%, rgba(255,86,170,.20), transparent 72%),
      radial-gradient(48% 40% at 62% 82%, rgba(80,96,224,.24), transparent 72%);
    filter: blur(6px);
    animation: nebulaDrift 42s ease-in-out infinite;
  }
  @keyframes nebulaDrift{
    0%,100%{ transform: scale(1) translate(0,0); opacity:.85; }
    50%{ transform: scale(1.08) translate(-2%, 1.5%); opacity:1; }
  }
  .star{
    position:absolute; border-radius:50%;
    background:#fff;
    opacity:0; will-change: opacity, transform;
    animation: twinkle var(--tw) ease-in-out var(--delay) infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity: calc(var(--max) * .25); transform: scale(.7); }
    50%{ opacity: var(--max); transform: scale(1); }
  }
  .orb{
    position:absolute; border-radius:50%;
    background: radial-gradient(circle at 35% 32%, var(--c), transparent 70%);
    filter: blur(24px); opacity:.16; will-change: transform;
    animation: drift var(--d) ease-in-out var(--delay) infinite;
  }
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(4vw,-3vh) scale(1.12); }
  }

  /* ---------- Mensajes ---------- */
  .message{
    position:absolute;
    max-width: 18ch;
    text-align:center;
    font-family:'Cormorant Garamond', Georgia, serif;
    font-weight:500;
    font-size: clamp(1.7rem, 7.6vw, 2.9rem);
    line-height: 1.32;
    letter-spacing:.2px;
    color: var(--ink);
    text-shadow: 0 2px 26px rgba(255,150,190,.30), 0 1px 2px rgba(0,0,0,.35);
    opacity:0;
    transform: translateY(30px) scale(.975);
    filter: blur(9px);
    transition:
      opacity 1.15s cubic-bezier(.2,.7,.2,1),
      transform 1.3s cubic-bezier(.2,.7,.2,1),
      filter 1.15s cubic-bezier(.2,.7,.2,1);
  }
  .message.in{ opacity:1; transform: translateY(0) scale(1); filter: blur(0); }
  .message.out{ opacity:0; transform: translateY(-28px) scale(1.025); filter: blur(11px); }

  /* ---------- Tarjeta de recuerdito ---------- */
  .card{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: clamp(16px, 3.4vh, 30px);
    padding: 5vh 6vw;
    opacity:0; transform: scale(1.045); filter: blur(7px);
    transition:
      opacity 1.2s ease,
      transform 1.5s cubic-bezier(.2,.7,.2,1),
      filter 1.2s ease;
  }
  .card.in{ opacity:1; transform: scale(1); filter: blur(0); }
  .card.out{ opacity:0; transform: scale(1.03); filter: blur(9px); }
  .card .bg{
    position:absolute; inset:0; z-index:-1;
    background-size:cover; background-position:center;
    filter: blur(36px) brightness(.5) saturate(1.25);
    transform: scale(1.3);
  }
  .frame{
    position:relative;
    border-radius: clamp(16px, 4.5vw, 26px);
    overflow:hidden;
    background:#0c0710;
    box-shadow: 0 26px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.07), inset 0 0 0 1px rgba(255,255,255,.04);
    max-width: min(88vw, 520px);
    max-height: 60vh;
    line-height:0;
  }
  .frame img, .frame video{
    display:block; width:auto; height:auto;
    max-width: min(88vw, 520px);
    max-height: 60vh;
    object-fit: contain;
  }
  .frame img.kb{ animation: kenburns 8.5s ease-out forwards; }
  @keyframes kenburns{
    from{ transform: scale(1.015) translate(0,0); }
    to{ transform: scale(1.11) translate(-1.4%, -1.6%); }
  }
  .cap{
    max-width: 26ch;
    text-align:center;
    font-family:'Poppins', system-ui, sans-serif;
    font-weight:300;
    font-size: clamp(1rem, 4.4vw, 1.22rem);
    line-height:1.45;
    color: var(--ink-soft);
    text-shadow: 0 2px 14px rgba(0,0,0,.5);
    opacity:0; transform: translateY(16px);
    transition: opacity .9s ease .3s, transform 1s cubic-bezier(.2,.7,.2,1) .3s;
  }
  .cap::before{
    content:''; display:block;
    width:34px; height:1px; margin:0 auto 14px;
    background: linear-gradient(90deg, transparent, rgba(255,170,200,.8), transparent);
    transform: scaleX(0); transform-origin:center;
    transition: transform .9s ease .45s;
  }
  .card.in .cap{ opacity:1; transform: translateY(0); }
  .card.in .cap::before{ transform: scaleX(1); }

  /* ---------- Recetas (montaje rápido) ---------- */
  .receta{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding: 6vh 8vw;
    opacity:0; transform: scale(1.06); filter: blur(7px);
    transition: opacity .55s ease, transform .7s cubic-bezier(.2,.7,.2,1), filter .55s ease;
  }
  .receta.in{ opacity:1; transform: scale(1); filter: blur(0); }
  .receta.out{ opacity:0; transform: scale(.975); filter: blur(7px); }
  .receta .bg{
    position:absolute; inset:0; z-index:-1;
    background-size:cover; background-position:center;
    filter: blur(34px) brightness(.45) saturate(1.2);
    transform: scale(1.3);
  }
  .receta .pic{
    border-radius: clamp(14px, 4vw, 22px);
    box-shadow: 0 20px 56px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
    background-size:cover; background-position:center;
    width: min(80vw, 440px);
    height: min(56vh, 560px);
  }

  /* ---------- Mensaje final ---------- */
  .final{
    position:absolute;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: clamp(14px, 2.6vh, 26px);
    max-width: min(90vw, 30rem);
    padding: 3vh 7vw;
    text-align:center;
    opacity:0; transform: translateY(26px) scale(.99); filter: blur(8px);
    transition: opacity 1.8s ease, transform 2s cubic-bezier(.2,.7,.2,1), filter 1.8s ease;
  }
  .final.in{ opacity:1; transform: translateY(0) scale(1); filter: blur(0); }
  .final-text{
    font-family:'Cormorant Garamond', Georgia, serif;
    font-weight:500; font-style:italic;
    font-size: clamp(1.18rem, 5.1vw, 1.95rem);
    line-height:1.36;
    color: var(--ink);
    text-shadow: 0 2px 30px rgba(255,150,190,.32), 0 1px 2px rgba(0,0,0,.4);
  }
  .final-heart{ line-height:0; }
  .final-heart .heart{
    width: clamp(46px, 12.5vw, 74px); height:auto;
    filter: drop-shadow(0 0 12px rgba(255,60,80,.55)) drop-shadow(0 0 28px rgba(230,30,70,.45));
    animation: beat 1.8s ease-in-out infinite;
  }
  @keyframes beat{
    0%,100%{ transform: scale(1); }
    14%{ transform: scale(1.18); }
    28%{ transform: scale(1); }
    42%{ transform: scale(1.12); }
  }

  /* ---------- Botón repetir ---------- */
  #replay{
    position:fixed; left:50%; bottom: max(26px, env(safe-area-inset-bottom));
    transform: translateX(-50%) scale(.8);
    z-index:6;
    width:52px; height:52px; border-radius:50%;
    border:1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--ink); font-size:1.5rem; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0; pointer-events:none;
    transition: opacity 1s ease, transform 1s ease, background .3s ease;
  }
  #replay.show{ opacity:.85; transform: translateX(-50%) scale(1); pointer-events:auto; }
  #replay:active{ background: rgba(255,255,255,.18); }

  /* ---------- Progreso sutil ---------- */
  #progress{
    position:fixed; left:0; top:0; height:2px; width:0%;
    z-index:6; pointer-events:none;
    background: linear-gradient(90deg, rgba(255,150,190,.0), rgba(255,150,190,.75));
    box-shadow: 0 0 10px rgba(255,150,190,.6);
    transition: width 1.2s linear;
    opacity:.55;
  }

  /* ---------- Loader + fade ---------- */
  #intro{
    position:fixed; inset:0; z-index:9;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 42%, rgba(22,12,40,.5), rgba(6,4,15,.85));
    transition: opacity 1.1s ease;
  }
  #intro.hide{ opacity:0; pointer-events:none; }
  #startBtn{
    background:none; border:0; padding:18px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition: transform .15s ease;
  }
  #startBtn:active{ transform: scale(.93); }
  /* Corazón dibujado a mano (SVG, no emoji) */
  .heart{ display:block; }
  #startBtn .heart{
    width: clamp(100px, 30vw, 140px); height:auto;
    filter: drop-shadow(0 0 13px rgba(255,60,80,.6)) drop-shadow(0 0 34px rgba(230,30,70,.45));
    animation: beat 1.7s ease-in-out infinite;
  }
  #fadein{
    position:fixed; inset:0; z-index:8; background:#06040f;
    opacity:0; pointer-events:none; transition: opacity 1.2s ease;
  }

  @media (prefers-reduced-motion: reduce){
    .message, .card, .receta, .final{ filter:none !important; }
    .message{ transform: translateY(10px); }
    .message.out{ transform: translateY(-10px); }
    .frame img.kb{ animation:none; }
    .star, .orb{ animation-duration: 60s; }
    #nebula{ animation: none; }
    body, body.calm{ animation: none; }
  }
</style>
</head>
<body>
  <div id="nebula"></div>
  <div id="stars"></div>
  <div class="vignette"></div>

  <main>
    <div id="messageLayer" class="layer"></div>
    <div id="mediaLayer" class="layer"></div>
    <div id="recetaLayer" class="layer"></div>
    <div id="finalLayer" class="layer"></div>
  </main>

  <div id="progress"></div>
  <button id="replay" aria-label="Repetir">&#8635;</button>
  <div id="fadein"></div>
  <div id="intro">
    <button id="startBtn" aria-label="Comenzar"></button>
  </div>

<script>
/* ============================================================
   CONTENIDO  (texto LITERAL — no se modifica ortografía)
   ============================================================ */

// FASE 1 — Mensajes de intro
const messages = [
  "Quizá no sea el mejor momento ni la forma jeje",
  "Desearia poder expresarte muchas cosas",
  "Pero mientras aprendo a hacerlo mejor gasto tokens jajajaja",
  "No quiere decir que esto lo escriba la IA",
  "Esto lo escribo yo al 100% :P",
  "Aun no proceso lo mucho que he compartido a tu lado",
  "Momentos bonitos, momentos dificiles, trasnochaditas juntos, muchos altibajos",
  "Pero ante todo, siempre a tu lado",
  "Poco a poco aprendo a amarte de muchas formas y entre esas a veces hay situaciones complicadas como esta jajaja",
  "Donde noto las cosas que pueden mejorar",
  "Lamento ser tan torpe y descuidado a veces, pero quiero que sepas que lo unico que quiero...",
  "Es lo mejor para tí y aunque quizá aun no lo sea, es lo que me impulsa a ser mejor",
  "Para poder ser esa persona que tanto mereces",
  "Espero sigamos juntos haste ese entonces, te dejo algunos recuerditos :)"
];

// FASE 2 — Recuerditos.  ORDEN PROVISIONAL (el usuario lo dictará).
// Para reordenar: solo mover las líneas de este arreglo.
const recuerditos = [
  { type:'photo', src:'assets/img/mem-primera-salidita.jpeg',     caption:'Primera salidita juntos' },
  { type:'photo', src:'assets/img/mem-concierto.jpeg',            caption:'Nuestra primera vez en un concierto jajaja, mi foto favorita' },
  { type:'video', src:'assets/vid/mem-primera-casa.mp4',          caption:'La primera vez que fuí a tu casa bien concentido jajaja' },
  { type:'video', src:'assets/vid/mem-ojitos.mp4',                caption:'tus hermosos ojitos', loop:true, hold:6500 },
  { type:'photo', src:'assets/img/mem-hermosa.jpeg',              caption:'No sé como haces para salir tan hermosa en todas las fotos' },
  { type:'photo', src:'assets/img/mem-lamparita.jpeg',            caption:'lamparita que me llevo hora y media armar jajaja' },
  { type:'photo', src:'assets/img/mem-lamparita-resultado.jpeg',  caption:'Resultado de la lamparita despues de la hora y media jajaja' },
  { type:'photo', src:'assets/img/mem-arreglo.jpeg',              caption:'Mi primer arreglo hecho jajaja' },
  { type:'photo', src:'assets/img/mem-borracha.jpeg',             caption:'Tu borracha despues de haberme hecho caminar todo un centro comercial buscando un llavero jajajjaja' },
  { type:'video', src:'assets/vid/mem-silla.mp4',                 caption:'tu en silla de ruedas' }
];

// FASE 3 — Recetas (montaje rápido, sin texto)
const recetas = [
  'assets/receta/receta-01.jpeg','assets/receta/receta-02.jpeg','assets/receta/receta-03.jpeg',
  'assets/receta/receta-04.jpeg','assets/receta/receta-05.jpeg','assets/receta/receta-06.jpeg',
  'assets/receta/receta-07.jpeg','assets/receta/receta-08.jpeg','assets/receta/receta-09.jpeg',
  'assets/receta/receta-10.jpeg'
];

// FASE 4 — Mensaje final (literal)
const finalMessage = "Quiero que sepas, que para bien o para mal jaja. Te has vuelto en lo mas bonito de mi vida y no sé que sería de mi si te llegará a pasar algo. Lamento haberte descuidado en ese momento, lamento mucho no respetar tu forma de ver las cosas. Mientras pueda, estaré a tu lado apoyandote en lo que pueda e iré comprendiente cada vez mas. Eres una persona muy grandiosa, te amo mucho mi rencorosa♥️";

/* ============================================================
   MOTOR
   ============================================================ */
const $ = s => document.querySelector(s);
const messageLayer = $('#messageLayer');
const mediaLayer   = $('#mediaLayer');
const recetaLayer  = $('#recetaLayer');
const finalLayer   = $('#finalLayer');
const progress     = $('#progress');
const replayBtn    = $('#replay');

const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
const wait  = ms => new Promise(r => setTimeout(r, ms));
const nextFrame = () => new Promise(r => requestAnimationFrame(()=> requestAnimationFrame(r)));

let runId = 0; // permite cancelar una corrida anterior al repetir

/* ----- Corazón SVG (dibujado a mano, no emoji) ----- */
function makeHeart(id){
  return '<svg class="heart" viewBox="0 0 32 30" aria-hidden="true">' +
    '<defs><linearGradient id="hg'+id+'" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#ff7b84"/>' +
      '<stop offset="52%" stop-color="#ff2e45"/>' +
      '<stop offset="100%" stop-color="#c20f2c"/>' +
    '</linearGradient></defs>' +
    '<path fill="url(#hg'+id+')" d="M16 28 C16 28 2.5 19.6 2.5 10.5 C2.5 6 6 2.8 10 2.8 C12.8 2.8 15 4.6 16 6.8 C17 4.6 19.2 2.8 22 2.8 C26 2.8 29.5 6 29.5 10.5 C29.5 19.6 16 28 16 28 Z"/>' +
  '</svg>';
}

/* ----- Estrellas + orbes (galaxia) ----- */
function buildStars(){
  const layer = $('#stars');
  // estrellas titilantes
  for(let i=0;i<90;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const big = Math.random() < 0.15;
    const size = big ? (2.2 + Math.random()*1.8) : (1 + Math.random()*1.5);
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = (Math.random()*100) + 'vw';
    s.style.top = (Math.random()*100) + 'vh';
    s.style.setProperty('--tw', (2.5 + Math.random()*4).toFixed(2) + 's');
    s.style.setProperty('--delay', (-Math.random()*6).toFixed(2) + 's');
    s.style.setProperty('--max', (0.5 + Math.random()*0.5).toFixed(2));
    if(big) s.style.boxShadow = '0 0 6px rgba(255,255,255,.85)';
    const tint = Math.random();
    if(tint < 0.12) s.style.background = '#ffd9f3';
    else if(tint < 0.22) s.style.background = '#cdb8ff';
    else if(tint < 0.30) s.style.background = '#bcd3ff';
    layer.appendChild(s);
  }
  // orbes suaves de nebulosa cercana
  const tones = ['#b15cff','#ff6fce','#6f8cff','#c9a0ff'];
  for(let i=0;i<5;i++){
    const o = document.createElement('div');
    o.className = 'orb';
    const sz = 120 + Math.random()*150;
    o.style.width = sz+'px';
    o.style.height = sz+'px';
    o.style.left = (Math.random()*100) + 'vw';
    o.style.top = (Math.random()*100) + 'vh';
    o.style.setProperty('--c', tones[i % tones.length]);
    o.style.setProperty('--d', (22 + Math.random()*16).toFixed(1) + 's');
    o.style.setProperty('--delay', (-Math.random()*20).toFixed(1) + 's');
    layer.appendChild(o);
  }
}

/* ----- Progreso ----- */
let totalSteps = messages.length + recuerditos.length + 1 /*titulo cocina*/ + 1 /*recetas*/ + 1 /*final*/;
let stepDone = 0;
function tickProgress(){
  stepDone++;
  progress.style.width = clamp((stepDone/totalSteps)*100, 0, 100) + '%';
}

/* ----- Fase 1: mensajes ----- */
async function showMessage(text, myRun){
  const el = document.createElement('div');
  el.className = 'message';
  el.textContent = text;
  messageLayer.appendChild(el);
  await nextFrame();
  if(myRun !== runId) return el.remove();
  el.classList.add('in');

  const read = clamp(1300 + 45*text.length, 2400, 5200);
  await wait(read);
  if(myRun !== runId) return el.remove();

  el.classList.remove('in');
  el.classList.add('out');
  setTimeout(()=> el.remove(), 1400);
  tickProgress();
  await wait(430); // ligero solape con el siguiente
}

async function runMessages(myRun){
  for(const m of messages){
    if(myRun !== runId) return;
    await showMessage(m, myRun);
  }
}

/* ----- Fase 2: recuerditos ----- */
function playVideo(v, myRun){
  return new Promise(resolve=>{
    let settled = false;
    const done = ()=>{ if(settled) return; settled = true; cleanup(); resolve(); };
    const onEnded = ()=> done();
    const onError = ()=> done();
    const cap = setTimeout(done, 16000); // tope de seguridad
    function cleanup(){
      v.removeEventListener('ended', onEnded);
      v.removeEventListener('error', onError);
      clearTimeout(cap);
    }
    v.addEventListener('ended', onEnded);
    v.addEventListener('error', onError);
    const p = v.play();
    if(p && p.catch){
      p.catch(()=>{ /* autoplay bloqueado: el tope avanzará igual */ });
    }
  });
}

// Reproduce el video (en loop) y lo mantiene 'ms' en pantalla para poder leer el caption
function playForDuration(v, ms){
  return new Promise(resolve=>{
    setTimeout(resolve, ms);
    const p = v.play();
    if(p && p.catch) p.catch(()=>{});
  });
}

async function showRecuerdito(item, myRun){
  const card = document.createElement('figure');
  card.className = 'card';

  // fondo difuminado (solo fotos)
  if(item.type === 'photo'){
    const bg = document.createElement('div');
    bg.className = 'bg';
    bg.style.backgroundImage = `url("${item.src}")`;
    card.appendChild(bg);
  }

  const frame = document.createElement('div');
  frame.className = 'frame';
  let media;
  if(item.type === 'video'){
    media = document.createElement('video');
    media.src = item.src;
    media.muted = true; media.defaultMuted = true;
    media.setAttribute('muted','');
    media.setAttribute('playsinline','');
    media.setAttribute('webkit-playsinline','');
    media.preload = 'auto';
  } else {
    media = document.createElement('img');
    media.src = item.src;
    media.alt = item.caption;
    media.classList.add('kb');
  }
  frame.appendChild(media);
  card.appendChild(frame);

  const cap = document.createElement('figcaption');
  cap.className = 'cap';
  cap.textContent = item.caption;
  card.appendChild(cap);

  mediaLayer.appendChild(card);
  await nextFrame();
  if(myRun !== runId) return card.remove();
  card.classList.add('in');

  if(item.type === 'video'){
    if(item.loop){
      media.loop = true;
      await playForDuration(media, item.hold || 6500);
    } else {
      await playVideo(media, myRun);
    }
  } else {
    await wait(5400);
  }
  if(myRun !== runId) return card.remove();

  card.classList.add('out');
  setTimeout(()=> card.remove(), 1400);
  tickProgress();
  await wait(680); // solape entre recuerditos
}

async function runRecuerditos(myRun){
  for(const item of recuerditos){
    if(myRun !== runId) return;
    await showRecuerdito(item, myRun);
  }
}

/* ----- Fase 3: recetas (montaje rápido) ----- */
async function showReceta(src, myRun){
  const wrap = document.createElement('div');
  wrap.className = 'receta';
  const bg = document.createElement('div');
  bg.className = 'bg';
  bg.style.backgroundImage = `url("${src}")`;
  const pic = document.createElement('div');
  pic.className = 'pic';
  pic.style.backgroundImage = `url("${src}")`;
  wrap.append(bg, pic);
  recetaLayer.appendChild(wrap);

  await nextFrame();
  if(myRun !== runId) return wrap.remove();
  wrap.classList.add('in');
  await wait(640);
  if(myRun !== runId) return wrap.remove();
  wrap.classList.add('out');
  setTimeout(()=> wrap.remove(), 700);
  await wait(360); // ritmo rápido, con solape
}

async function runRecetas(myRun){
  for(const src of recetas){
    if(myRun !== runId) return;
    await showReceta(src, myRun);
  }
  tickProgress();
}

/* ----- Fase 4: mensaje final ----- */
// Reduce el tamaño del texto final solo lo necesario para que quepa en pantalla
function fitFinal(wrap){
  const textEl = wrap.querySelector('.final-text');
  if(!textEl) return;
  const avail = window.innerHeight - 20;
  let px = parseFloat(getComputedStyle(textEl).fontSize);
  let guard = 0;
  while(wrap.offsetHeight > avail && px > 13 && guard < 80){
    px -= 1;
    textEl.style.fontSize = px + 'px';
    guard++;
  }
}

async function runFinal(myRun){
  document.body.classList.add('calm');
  await wait(400);
  if(myRun !== runId) return;

  const wrap = document.createElement('div');
  wrap.className = 'final';
  const p = document.createElement('p');
  p.className = 'final-text';
  p.textContent = finalMessage;
  const heart = document.createElement('div');
  heart.className = 'final-heart';
  heart.innerHTML = makeHeart('b');
  wrap.append(p, heart);
  finalLayer.appendChild(wrap);

  await nextFrame();
  if(myRun !== runId) return wrap.remove();
  fitFinal(wrap);
  wrap.classList.add('in');
  tickProgress();

  await wait(3400);
  if(myRun !== runId) return;
  replayBtn.classList.add('show');
}

/* ----- Orquestador ----- */
async function run(){
  const myRun = ++runId;
  // limpiar todo (por si es un repeat)
  [messageLayer, mediaLayer, recetaLayer, finalLayer].forEach(l => l.innerHTML='');
  document.body.classList.remove('calm');
  replayBtn.classList.remove('show');
  stepDone = 0; progress.style.width = '0%';

  await runMessages(myRun);
  if(myRun !== runId) return;
  await runRecuerditos(myRun);
  if(myRun !== runId) return;
  await showMessage("Las veces que me has cocinado ♥️", myRun);
  if(myRun !== runId) return;
  await runRecetas(myRun);
  if(myRun !== runId) return;
  await runFinal(myRun);
}

/* ----- Precarga + arranque ----- */
function preload(){
  const imgs = [
    ...recuerditos.filter(r=>r.type==='photo').map(r=>r.src),
    ...recetas
  ];
  imgs.forEach(src=>{ const im = new Image(); im.src = src; });
}

async function beginSequence(){
  $('#intro').classList.add('hide');
  await wait(900);
  run();
}

function setup(){
  buildStars();
  preload();
  $('#startBtn').innerHTML = makeHeart('a');
  $('#startBtn').addEventListener('click', beginSequence, { once:true });
}

replayBtn.addEventListener('click', ()=>{
  replayBtn.classList.remove('show');
  run();
});

let started = false;
function startOnce(){ if(started) return; started = true; setup(); }
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', startOnce);
} else {
  startOnce();
}
</script>
</body>
